name: CI

on:
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - '.claude/**'
      - '.github/**'
      - '!.github/workflows/**'
      - '*.md'
      - 'docs/**'
      - '.gitignore'
      - '.gitattributes'
      - 'LICENSE'
      - 'CODEOWNERS'
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '.claude/**'
      - '.github/**'
      - '!.github/workflows/**'
      - '*.md'
      - 'docs/**'
      - '.gitignore'
      - '.gitattributes'
      - 'LICENSE'
      - 'CODEOWNERS'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Format, Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: |
          for pkg in packages/*/; do
            if [ -d "${pkg}test" ]; then
              echo "Running tests in ${pkg}"
              EXTRA_ARGS=""
              if [ "$pkg" = "packages/audiflow_domain/" ]; then
                # Limit concurrency to avoid Isar OOM on CI runners
                EXTRA_ARGS="--concurrency=1"
              fi
              (cd "$pkg" && flutter test --test-randomize-ordering-seed=random $EXTRA_ARGS)
            fi
          done
