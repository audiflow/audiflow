name: Deploy Staging

on:
  push:
    tags:
      - 'stg-*'

concurrency:
  group: deploy-stg
  cancel-in-progress: false

env:
  FLUTTER_VERSION: '3.41.4'

jobs:
  prepare:
    name: Parse version
    runs-on: ubuntu-latest
    outputs:
      version_string: ${{ steps.parse.outputs.version_string }}
    steps:
      - name: Parse version from tag
        id: parse
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          TAG="${GIT_TAG#stg-}"
          echo "version_string=$TAG" >> "$GITHUB_OUTPUT"
          echo "Parsed version: $TAG"

  deploy-ios:
    name: iOS TestFlight
    needs: prepare
    runs-on: macos-14
    timeout-minutes: 30
    env:
      VERSION_STRING: ${{ needs.prepare.outputs.version_string }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Apple certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/apple_distribution.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          echo "$CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Install provisioning profile
        id: pp
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_STG_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/stg_profile.mobileprovision
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(/usr/bin/security cms -D -i "$PP_PATH")")
          PP_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< "$(/usr/bin/security cms -D -i "$PP_PATH")")
          echo "uuid=$PP_UUID" >> "$GITHUB_OUTPUT"
          echo "name=$PP_NAME" >> "$GITHUB_OUTPUT"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID".mobileprovision

      - name: Write .env.stg
        env:
          ENV_STG: ${{ secrets.ENV_STG }}
        run: echo "$ENV_STG" > .env.stg

      - name: Bump version
        run: |
          cd packages/audiflow_app
          sed -i '' "s/^version: .*/version: $VERSION_STRING/" pubspec.yaml
          grep "^version:" pubspec.yaml

      - name: Get dependencies
        run: flutter pub get

      - name: Setup App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_PRIVATE_KEY" > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Override signing to manual
        run: |
          PP_NAME="${{ steps.pp.outputs.name }}"
          XCCONFIG_DIR=packages/audiflow_app/ios/Flutter
          SIGNING_SNIPPET="$(printf '\nCODE_SIGN_STYLE=Manual\nCODE_SIGN_IDENTITY=Apple Distribution\nPROVISIONING_PROFILE_SPECIFIER=%s\n' "$PP_NAME")"

          for f in stgDebug.xcconfig stgRelease.xcconfig stgProfile.xcconfig; do
            echo "$SIGNING_SNIPPET" >> "$XCCONFIG_DIR/$f"
            echo "Patched $f"
          done

          PBXPROJ=packages/audiflow_app/ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' "$PBXPROJ"

          if ! grep -q 'CODE_SIGN_STYLE=Manual' "$XCCONFIG_DIR/stgRelease.xcconfig"; then
            echo "::error::Failed to inject signing settings into stgRelease.xcconfig"
            exit 1
          fi
          if ! grep -q "PROVISIONING_PROFILE_SPECIFIER=$PP_NAME" "$XCCONFIG_DIR/stgRelease.xcconfig"; then
            echo "::error::Failed to inject provisioning profile into stgRelease.xcconfig"
            exit 1
          fi
          echo "Signing overrides applied to stg xcconfigs and pbxproj"

      - name: Write ExportOptions.plist
        run: |
          cat > packages/audiflow_app/ios/ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>R6HMM3C9D7</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.reedom.audiflow.stg</key>
              <string>PP_NAME_PLACEHOLDER</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>manageAppVersionAndBuildNumber</key>
            <true/>
          </dict>
          </plist>
          PLIST
          PP_NAME="${{ steps.pp.outputs.name }}"
          sed -i '' "s|PP_NAME_PLACEHOLDER|${PP_NAME}|" packages/audiflow_app/ios/ExportOptions.plist

          if ! grep -q "$PP_NAME" packages/audiflow_app/ios/ExportOptions.plist; then
            echo "::error::Failed to inject provisioning profile name into ExportOptions.plist"
            exit 1
          fi

      - name: Build IPA
        run: |
          cd packages/audiflow_app
          flutter build ipa --flavor stg -t lib/main_stg.dart \
            --dart-define-from-file=../../.env.stg \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun altool --upload-app --type ios \
            -f packages/audiflow_app/build/ios/ipa/*.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload iOS debug symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          brew install getsentry/tools/sentry-cli
          sentry-cli debug-files upload \
            --include-sources \
            packages/audiflow_app/build/ios/archive/Runner.xcarchive/dSYMs

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

  deploy-android:
    name: Android Firebase App Distribution
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERSION_STRING: ${{ needs.prepare.outputs.version_string }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Write .env.stg
        env:
          ENV_STG: ${{ secrets.ENV_STG }}
        run: echo "$ENV_STG" > .env.stg

      - name: Setup Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          for var in ANDROID_KEYSTORE_BASE64 ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD ANDROID_STORE_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required secret: $var"
              exit 1
            fi
          done
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > packages/audiflow_app/android/app/upload-keystore.jks
          printf 'keyAlias=%s\nkeyPassword=%s\nstoreFile=upload-keystore.jks\nstorePassword=%s\n' \
            "$ANDROID_KEY_ALIAS" "$ANDROID_KEY_PASSWORD" "$ANDROID_STORE_PASSWORD" \
            > packages/audiflow_app/android/key.properties
          chmod 600 packages/audiflow_app/android/app/upload-keystore.jks
          chmod 600 packages/audiflow_app/android/key.properties

      - name: Bump version
        run: |
          cd packages/audiflow_app
          sed -i "s/^version: .*/version: $VERSION_STRING/" pubspec.yaml
          grep "^version:" pubspec.yaml

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          cd packages/audiflow_app
          flutter build apk --flavor stg -t lib/main_stg.dart --dart-define-from-file=../../.env.stg

      - name: Write Firebase service account
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_CREDENTIALS_JSON }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          if [ -z "$FIREBASE_SA_JSON" ]; then
            echo "::error::Missing required secret: FIREBASE_SERVICE_CREDENTIALS_JSON"
            exit 1
          fi
          printf '%s' "$FIREBASE_SA_JSON" > "$GOOGLE_APPLICATION_CREDENTIALS"
          chmod 600 "$GOOGLE_APPLICATION_CREDENTIALS"
          python3 -c "import json; json.load(open('$GOOGLE_APPLICATION_CREDENTIALS'))"

      - name: Upload to Firebase App Distribution
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          npm install -g firebase-tools
          firebase appdistribution:distribute \
            packages/audiflow_app/build/app/outputs/flutter-apk/app-stg-release.apk \
            --app "$FIREBASE_APP_ID"

      - name: Cleanup Firebase credentials
        if: always()
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: rm -f "$GOOGLE_APPLICATION_CREDENTIALS"

      - name: Upload Android debug symbols to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          curl -sL https://sentry.io/get-cli/ | bash
          sentry-cli debug-files upload \
            --include-sources \
            packages/audiflow_app/build/app/intermediates/merged_native_libs/stgRelease

      - name: Cleanup signing materials
        if: always()
        run: |
          rm -f packages/audiflow_app/android/app/upload-keystore.jks
          rm -f packages/audiflow_app/android/key.properties

  sentry-release:
    name: Create Sentry release
    needs: [prepare, deploy-ios, deploy-android]
    runs-on: ubuntu-latest
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Sentry release
        env:
          VERSION: ${{ needs.prepare.outputs.version_string }}
        run: |
          curl -sL https://sentry.io/get-cli/ | bash
          sentry-cli releases new "$VERSION"
          sentry-cli releases set-commits "$VERSION" --auto
          sentry-cli releases finalize "$VERSION"
          sentry-cli releases deploys "$VERSION" new -e stg
