name: audiflow_domain
description: "Business logic and data layer for Audiflow"
version: 0.0.1
publish_to: 'none'

environment:
  sdk: ^3.10.0

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  audiflow_ai:
    path: ../audiflow_ai
  audiflow_core:
    path: ../audiflow_core
  audiflow_podcast:
    path: ../audiflow_podcast
  audiflow_search:
    path: ../audiflow_search
  riverpod: ^3.2.0
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1
  dio: ^5.9.0
  riverpod_annotation: ^4.0.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  shared_preferences: ^2.5.4
  package_info_plus: ^9.0.0
  connectivity_plus: ^7.0.0
  logger: ^2.6.2
  just_audio: ^0.10.5
  speech_to_text: ^7.3.0
  rxdart: ^0.28.0
  meta: ^1.17.0
  xml: ^6.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.10.5
  riverpod_generator: ^4.0.2
  freezed: ^3.2.4
  json_serializable: ^6.11.4
  drift_dev: ^2.25.0
  mockito: ^5.6.3
  json_schema: ^5.2.2

