name: audiflow_app
description: "Audiflow main application"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.10.0

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  riverpod: ^3.2.0
  flutter_riverpod: ^3.2.0
  riverpod_annotation: ^4.0.1

  # Navigation
  go_router: ^17.0.1

  # Audio
  audio_service: ^0.18.18
  audio_session: ^0.2.2
  just_audio: ^0.10.5

  # Error tracking
  sentry_flutter: ^9.10.0
  sentry_dio: ^9.10.0

  # Build tools
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

  # i18n
  intl: ^0.20.2

  # UI
  cupertino_icons: ^1.0.8
  material_symbols_icons: ^4.2801.0

  # Utilities
  logger: ^2.6.2
  shared_preferences: ^2.5.4
  package_info_plus: ^9.0.0
  dio: ^5.9.0

  # Internal packages
  audiflow_ai:
    path: ../audiflow_ai
  audiflow_core:
    path: ../audiflow_core
  audiflow_domain:
    path: ../audiflow_domain
  audiflow_search:
    path: ../audiflow_search
  audiflow_ui:
    path: ../audiflow_ui
  extended_image: ^10.0.1
  flutter_html: ^3.0.0
  share_plus: ^12.0.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.6.3
  build_runner: ^2.10.5
  riverpod_generator: ^4.0.2
  go_router_builder: ^4.1.3
  flutter_flavorizr: ^2.4.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  generate: true

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
