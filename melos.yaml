name: audiflow

packages:
  - packages/**

command:
  bootstrap:
    hooks:
      # post: melos run codegen --no-select  # Temporarily disabled until Phase 2

scripts:
  # Code generation across all packages
  codegen:
    run: dart run build_runner build --delete-conflicting-outputs
    exec:
      concurrency: 4
    packageFilters:
      dirExists: lib

  # Code generation in watch mode
  codegen:watch:
    run: dart run build_runner watch --delete-conflicting-outputs
    exec:
      concurrency: 4
    packageFilters:
      dirExists: lib

  # Run all tests
  test:
    run: flutter test
    exec:
      concurrency: 4
    packageFilters:
      dirExists: test

  # Generate coverage reports
  test:coverage:
    run: flutter test --coverage
    exec:
      concurrency: 4
    packageFilters:
      dirExists: test

  # Analyze all packages
  analyze:
    run: flutter analyze
    exec:
      concurrency: 4

  # Clean all packages
  clean:
    run: flutter clean
    exec:
      concurrency: 4
