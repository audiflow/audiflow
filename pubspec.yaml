name: audiflow
description: A podcast player for Android and iOS.

version: 1.0.0
publish_to: none
environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: 3.16.9

dependencies:
  accessibility_tools: ^1.0.1
  audio_service: ^0.18.12
  audio_session: ^0.1.18
  auto_size_text: ^3.0.0
  collection: ^1.18.0
  connectivity_plus: ^5.0.2
  crypto: ^3.0.3
  cupertino_icons: ^1.0.6
  device_info_plus: ^9.1.2
  dynamic_color: ^1.7.0
  expand_widget: ^3.1.1
  extended_image: ^8.2.0
  file_picker: ^6.2.0
  flutter:
    sdk: flutter
  flutter_dialogs: ^3.0.0
  flutter_downloader: ^1.11.6
  flutter_hooks: ^0.20.5
  flutter_html: ^3.0.0-beta.2
  flutter_html_svg: ^3.0.0-beta.2
  flutter_html_table: ^3.0.0-beta.2
  flutter_launcher_icons: ^0.13.1
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.4.10
  flutter_spinkit: ^5.2.0
  freezed_annotation: ^2.4.1
  go_router: ^13.2.0
  hooks_riverpod: ^2.4.10
  html: ^0.15.4
  intl: ^0.18.1
  json_annotation: ^4.8.1
  just_audio: ^0.9.36
  logging: ^1.2.0
  material_symbols_icons: ^4.2719.1
  meta: ^1.11.0
  mp3_info: ^0.2.1
  nanoid: ^1.0.0
  palette_generator: ^0.3.3+3
  path: ^1.9.0
  path_provider: ^2.1.2
  path_provider_platform_interface: ^2.1.2
  percent_indicator: 4.2.3
  permission_handler: ^11.3.0
  podcast_search:
    git:
      url: git@github.com:reedom/podcast_search.git
      ref: feature/lookup
  provider: ^6.1.2
  riverpod: ^2.5.0
  riverpod_annotation: ^2.3.4
  rxdart: ^0.27.7
  scrollable_positioned_list: ^0.3.8
  sembast: ^3.6.0
  share_plus: ^7.2.2
  shared_preferences: ^2.2.2
  sliver_tools: ^0.2.12
  uni_links: ^0.5.1
  url_launcher: ^6.2.5
  xml: 6.5.0

dev_dependencies:
  build_runner: ^2.4.8
  custom_lint: ^0.6.2
  flutter_lints: ^3.0.1
  flutter_test:
    sdk: flutter
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  mockito: ^5.4.4
  pedantic_mono: ^1.26.0
  riverpod_generator: ^2.3.11
  riverpod_lint: ^2.3.9

dependency_overrides:
  # Override layout grid to fix dependency issue with flutter_html_table
  flutter_layout_grid: ^2.0.5

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app-logo.png"
  min_sdk_android: 22

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/app-logo.png

    # Certificate authorities
    - assets/ca/lets-encrypt-r3.pem

  fonts:
    - family: SpaceMonoRegular
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
    - family: SpaceMonoBold
      fonts:
        - asset: assets/fonts/SpaceMono-Bold.ttf
    - family: RobotoCondensedBold
      fonts:
        - asset: assets/fonts/RobotoCondensed-Bold.ttf
    - family: RobotoRegular
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
    - family: MontserratMedium
      fonts:
        - asset: assets/fonts/Montserrat-Medium.otf
    - family: MontserratRegular
      fonts:
        - asset: assets/fonts/Montserrat-Regular.otf
    - family: MontserratBold
      fonts:
        - asset: assets/fonts/Montserrat-Bold.otf
