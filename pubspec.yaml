name: audiflow
description: "A podcast player for Android and iOS."
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.10.0

workspace:
  - packages/audiflow_ai
  - packages/audiflow_app
  - packages/audiflow_cli
  - packages/audiflow_core
  - packages/audiflow_domain
  - packages/audiflow_podcast
  - packages/audiflow_search
  - packages/audiflow_ui

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  melos: ^7.3.0
  pedantic_mono: ^1.35.0

dependency_overrides:
  isar_community:
    git:
      url: https://github.com/isar-community/isar-community.git
      path: packages/isar_community
      ref: 3.3.2
  isar_community_flutter_libs: 3.3.2
  isar_community_generator:
    git:
      url: https://github.com/isar-community/isar-community.git
      path: packages/isar_community_generator
      ref: 3.3.2

flutter:
  uses-material-design: true

melos:
  scripts:
    # Code generation across all packages
    codegen:
      exec: dart run build_runner build --delete-conflicting-outputs
      concurrency: 4
      packageFilters:
        dirExists: lib

    # Code generation in watch mode
    codegen:watch:
      exec: dart run build_runner watch --delete-conflicting-outputs
      concurrency: 4
      packageFilters:
        dirExists: lib

    # Run all tests
    test:
      exec: flutter test
      concurrency: 4
      packageFilters:
        dirExists: test

    # Generate coverage reports
    test:coverage:
      exec: flutter test --coverage
      concurrency: 4
      packageFilters:
        dirExists: test

    # Analyze all packages
    analyze:
      exec: flutter analyze
      concurrency: 1

    # Clean all packages
    clean:
      exec: flutter clean
      concurrency: 4

    # Get dependencies
    get:
      exec: flutter pub get
      concurrency: 4
