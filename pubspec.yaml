name: audiflow
description: A podcast player for Android and iOS.

version: 1.0.0+14
publish_to: none
environment:
  sdk: '>=3.4.3 <4.0.0'
  flutter: 3.27.1
isar_version: &isar_version 3.1.8

dependencies:
  accessibility_tools: 2.3.0
  audio_service: 0.18.16
  audio_session: 0.1.23
  auto_size_text: 3.0.0
  collection: 1.19.0
  conditional_wrap: 3.0.0
  connectivity_plus: 6.1.1
  country_picker: 2.0.27
  crypto: 3.0.6
  cupertino_icons: 1.0.8
  device_info_plus: 11.2.0
  dio: 5.7.0
  dio_cache_interceptor: 3.5.1
  dio_cache_interceptor_file_store: 1.2.3
  dio_cache_interceptor_isar_store: 1.0.1
  dynamic_color: 1.7.0
  expand_widget: 3.1.1
  extended_image: 9.1.0
  file_picker: 8.1.7
  firebase_core: 3.4.0
  flutter:
    sdk: flutter
  flutter_dialogs: 3.0.0
  flutter_downloader: 1.11.8
  flutter_hooks: 0.20.5
  flutter_widget_from_html: 0.15.3
  flutter_launcher_icons: 0.14.2
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: 2.6.1
  flutter_spinkit: 5.2.1
  freezed_annotation: 2.4.4
  go_router: 14.6.3
  hooks_riverpod: 2.6.1
  html: 0.15.5
  intl: 0.19.0
  isar:
    hosted: https://pub.isar-community.dev/
    version: *isar_version
  isar_flutter_libs:
    hosted: https://pub.isar-community.dev/
    version: *isar_version
  json_annotation: 4.9.0
  just_audio: 0.9.42
  logger: 2.5.0
  material_symbols_icons: 4.2801.1
  meta: 1.16.0
  mixpanel_flutter: 2.3.3
  mp3_info: 0.2.1
  nanoid: 1.0.0
  package_info_plus: 8.1.2
  palette_generator: 0.3.3+5
  path: 1.9.0
  path_provider: 2.1.5
  path_provider_platform_interface: 2.1.2
  percent_indicator: 4.2.4
  permission_handler: 11.3.1
  podcast_feed:
    git:
      url: git@github.com:reedom/podcast_feed.git
      ref: develop
  podcast_search:
    git:
      url: git@github.com:reedom/podcast_search.git
      ref: feature/lookup
  provider: 6.1.2
  riverpod: 2.6.1
  riverpod_annotation: 2.6.1
  rxdart: 0.28.0
  scrollable_positioned_list: 0.3.8
  scrolls_to_top:
    git:
      url: git@github.com:reedom/scrolls_to_top.git
  sentry_dio: 8.9.0
  sentry_flutter: 8.9.0
  share_plus: 10.1.3
  shared_preferences: 2.3.5
  sliver_tools: 0.2.12
  theme_extensions_builder_annotation: 4.0.1
  uni_links: 0.5.1
  url_launcher: 6.3.1
  worker_manager: 7.2.2
  xml: 6.5.0

dev_dependencies:
  build_runner: 2.4.14
  custom_lint: 0.7.0 # 0.7.1
  flutter_flavorizr: 2.2.3
  flutter_lints: 5.0.0
  flutter_native_splash: 2.4.4
  flutter_test:
    sdk: flutter
  freezed: 2.5.7
  go_router_builder: 2.7.3
  http_mock_adapter: 0.6.1
  isar_generator:
    hosted: https://pub.isar-community.dev/
    version: *isar_version
  json_serializable: 6.9.0
  mockito: 5.4.5
  pedantic_mono: 1.29.0
  riverpod_generator: 2.6.3
  riverpod_lint: 2.6.3
  sentry_dart_plugin: 2.1.0

dependency_overrides:
  # Override layout grid to fix dependency issue with flutter_html_table
  # analyzer: 6.5.0
  flutter_layout_grid: 2.0.5
  isar:
    hosted: https://pub.isar-community.dev/
    version: *isar_version
  isar_flutter_libs:
    hosted: https://pub.isar-community.dev/
    version: *isar_version
  meta: 1.15.0

global_options:
  freezed:freezed:
    runs_before:
      - isar_generator:isar_generator

flutter:
  uses-material-design: true
  generate: true

  assets:
    # Certificate authorities
    - assets/ca/lets-encrypt-r3.pem

  fonts:
    - family: SpaceMonoRegular
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
    - family: SpaceMonoBold
      fonts:
        - asset: assets/fonts/SpaceMono-Bold.ttf
    - family: RobotoCondensedBold
      fonts:
        - asset: assets/fonts/RobotoCondensed-Bold.ttf
    - family: RobotoRegular
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
    - family: MontserratMedium
      fonts:
        - asset: assets/fonts/Montserrat-Medium.otf
    - family: MontserratRegular
      fonts:
        - asset: assets/fonts/Montserrat-Regular.otf
    - family: MontserratBold
      fonts:
        - asset: assets/fonts/Montserrat-Bold.otf

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  upload_sources: true
  project: audiflow
  org: reedom
  wait_for_processing: true
  log_level: trace # possible values: trace, debug, info, warn, error
  commits: auto
  ignore_missing: true
