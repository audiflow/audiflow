name: audiflow
description: "A podcast player for Android and iOS."
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.10.0

workspace:
  - packages/audiflow_app
  - packages/audiflow_core
  - packages/audiflow_domain
  - packages/audiflow_ui

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  melos: ^6.2.0
  pedantic_mono: ^1.28.0

flutter:
  uses-material-design: true
